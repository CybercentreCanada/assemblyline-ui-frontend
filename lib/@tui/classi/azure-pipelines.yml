trigger:
  branches:
    include:
      - main
  paths:
    include:
      - pnpm-lock.yaml
      - packages/classi/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - packages/classi/**

parameters:
  - name: publishToBoH
    displayName: Publish to BoH
    type: boolean
    default: false

variables:
  tag: '$(Build.BuildId)'
  branch: '$(Build.SourceBranchName)'
  moduleName: '@tui/classi'
  isPrBranch: $[eq(variables['Build.SourceBranchName'], 'merge')]
  isMainBranch: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
  folderSrcRoot: '$(Build.sourcesDirectory)/packages/cli'
  folderDownload: '$(Build.ArtifactStagingDirectory)/downloads'
  folderPublish: '$(Build.ArtifactStagingDirectory)/publish'
  folderExploded: '$(Build.ArtifactStagingDirectory)/exploded'

pool: cybertron-build-pool

stages:
  - stage: Check
    jobs:
      - job: CheckTuiClassi
        displayName: Check @tui/classi
        steps:
          - checkout: self
            clean: true
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm install v22
              nvm use v22
              npm install -g corepack@latest
              corepack enable pnpm
            displayName: 'node setup'
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm use v22
              cd $(folderSrcRoot)
              pnpm install
            displayName: 'pnpm install'
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm use v22
              cd $(folderSrcRoot)
              pnpm -F @tui/core build
            displayName: 'build @tui/core'
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm use v22
              cd $(folderSrcRoot)
              pnpm -F $(moduleName) typecheck
            displayName: 'pnpm run typecheck'
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm use v22
              cd $(folderSrcRoot)
              pnpm -F $(moduleName) lint
            displayName: 'pnpm run lint'

  - stage: Build
    jobs:
      - job: BuildTuiClassi
        displayName: Build $(moduleName)
        steps:
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm install v22
              nvm use v22
              npm install -g corepack@latest
              corepack enable pnpm
            displayName: 'node setup'
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm use v22
              pnpm install
            displayName: 'pnpm install'
          - bash: |
              pnpm -F $(moduleName) build
            displayName: 'Build $(moduleName)'
          - bash: |
              pnpm -F $(moduleName) pack
            displayName: 'Package $(moduleName)'
          - script: |
              echo "##vso[task.setvariable variable=PACKAGE_TGZ]$(ls *.tgz)"
            displayName: 'Detect packed artifact'
          - task: PublishBuildArtifacts@1
            inputs:
              pathtoPublish: '$(PACKAGE_TGZ)'
              artifactName: $(moduleName)
              publishLocation: 'Container'
            displayName: Publish build npm artifact

  - stage: Publish
    condition: and(succeeded(), or(eq(variables.isMainBranch, 'True'), eq('${{ parameters.publishToBoH }}', true)))
    jobs:
      - job: PublishTuiClassi
        displayName: Publish $(moduleName)
        steps:
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm install v22
              nvm use v22
              npm install -g corepack@latest
              corepack enable pnpm
            displayName: 'node setup'
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm use v22
              pnpm install
            displayName: 'pnpm install'
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: $(moduleName)
              downloadPath: $(folderDownload)
            displayName: 'Download artifact'
          - script: |

              # downloaded tarball variables.
              TARBALL_FOLDER="$(folderDownload)/$(moduleName)"
              TARBALL_WILDCARD="$TARBALL_FOLDER/*.tgz"
              TARBALL_PATH=$(ls $TARBALL_WILDCARD | head -n 1)

              # make necessary folders.
              mkdir -p $(folderPublish)
              mkdir -p $(folderExploded)

              # explode tarball so next task can read publish info from it.
              tar -xzf $TARBALL_PATH -C $(folderExploded)

              # move content of tarbal to publish folder.
              # this will be workingDir of Npm@1 task.
              mv "$(folderExploded)"/package/* "$(folderPublish)"/
            displayName: 'Prepare /publish'
          - script: |
              cd $(folderPublish)
              BASE_VERSION=$(pnpm pkg get version | tr -d '"')
              echo "Base version: ${BASE_VERSION}"
              echo "isMainBranch: $(isMainBranch)"
              echo "branch: $(Build.SourceBranch)"
              if [ "$(isMainBranch)" != "True" ]; then
                DEV_VERSION="${BASE_VERSION}-dev$(tag)"
                echo "Feature branch detected"
                echo "Bumping version to: ${DEV_VERSION}"
                npm version --no-git-tag-version $DEV_VERSION
              fi
            displayName: 'Set version'
          - task: Npm@1
            inputs:
              command: publish
              publishRegistry: useExternalRegistry
              publishEndpoint: bagofholding
              workingDir: $(folderPublish)
            displayName: 'Publish to BoH'
